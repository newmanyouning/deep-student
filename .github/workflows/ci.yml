name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '.github/**'
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, develop]

# 取消同一分支上的重复运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # 前端编译检查
  # ============================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Generate version info
        run: node scripts/generate-version.mjs

      - name: Type check
        run: npx tsc --noEmit

      - name: Security audit
        run: npm audit --omit=dev --audit-level=high || true

  # ============================================
  # 后端编译检查
  # ============================================
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf protobuf-compiler

      - name: Build check
        working-directory: src-tauri
        run: cargo check

  # ============================================
  # 同步模块回归测试
  #
  # 批判报告 P0-1 接入：这批测试（约 253 条用例，11k 行）原本只写不跑。
  # 这里作为独立 job 跑起来，避免和 Build 合在一起时互相阻塞 / 超时。
  # 所有 sync_* 测试都用内存 SQLite + MockCloudStorage，零外部依赖。
  # ============================================
  sync-tests:
    name: Sync Regression (${{ matrix.test-target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        test-target:
          - sync_scenarios_tests
          - sync_adversarial_tests
          - sync_chaos_tests
          - sync_integration_deep_tests
          - sync_pathological_tests
          - sync_proptest
          - sync_real_business_tables_tests
          - sync_real_schema_tests
          - sync_regression_tests
          - sync_weird_tests
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # proptest 在 CI 里用随机种子；固定一下便于 reproduce
      PROPTEST_CASES: '64'
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # 与 backend job 分开缓存 key，避免互相踩
          key: sync-tests

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf protobuf-compiler

      - name: Run sync regression target
        working-directory: src-tauri
        # 单 runner 只跑一个 sync test target，避免 10 个重型测试二进制串在同一 job
        # 里编译/链接/执行时被 hosted runner 杀掉，同时能精确定位是哪一个目标失败。
        run: cargo test --test ${{ matrix.test-target }}

  sync-module-unit-tests:
    name: Sync Module Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: sync-tests

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf protobuf-compiler

      - name: Run sync module unit tests (in-module #[cfg(test)])
        working-directory: src-tauri
        # 覆盖 mod.rs / hlc.rs / tombstone.rs / conflict_resolver.rs 里的 inline 测试
        run: cargo test --lib data_governance::sync

  # ============================================
  # 供应链安全审计
  # ============================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit (informational)
        working-directory: src-tauri
        # Non-blocking: advisories are almost always deep transitive deps
        # (aws-lc-sys via aws-sdk-s3, rustls-webpki via tokio-rustls, etc.)
        # that cannot be easily updated without major version bumps.
        run: cargo audit || true
