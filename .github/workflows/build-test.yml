name: Build Test

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target: windows / macos-arm64 / macos-x64 / linux / android / ipad / all-desktop'
        required: true
        type: string
        default: 'windows'
      source_ref:
        description: 'Branch / tag / commit SHA'
        type: string
        default: 'main'

concurrency:
  group: build-test-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  # ── Windows ──
  build-windows:
    if: contains(fromJSON('["windows", "all-desktop"]'), github.event.inputs.platform)
    runs-on: windows-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      CARGO_TERM_COLOR: always
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.source_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - run: npm ci --legacy-peer-deps
      - run: node scripts/generate-version.mjs
      - name: Disable updater signing (build test)
        run: node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.bundle.createUpdaterArtifacts=false;c.plugins.updater.pubkey='';fs.writeFileSync(p,JSON.stringify(c,null,2))"
      - name: Fast compile check (fail early on syntax/type errors)
        run: cargo check
        working-directory: src-tauri
      - run: npx tauri build --target x86_64-pc-windows-msvc
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  # ── macOS ARM64 ──
  build-macos-arm64:
    if: contains(fromJSON('["macos-arm64", "all-desktop"]'), github.event.inputs.platform)
    runs-on: macos-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      CARGO_TERM_COLOR: always
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.source_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - run: npm ci --legacy-peer-deps
      - run: node scripts/generate-version.mjs
      - name: Prepare pdfium (macOS arm64)
        run: |
          if [ -x "scripts/prepare-pdfium-macos.sh" ]; then
            bash scripts/prepare-pdfium-macos.sh "aarch64-apple-darwin"
          elif [ -x "scripts/download-pdfium.sh" ]; then
            rm -f src-tauri/resources/pdfium/libpdfium.dylib
            bash scripts/download-pdfium.sh macos-arm64
          fi
      - name: Disable updater signing (build test)
        run: node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.bundle.createUpdaterArtifacts=false;c.plugins.updater.pubkey='';fs.writeFileSync(p,JSON.stringify(c,null,2))"
      - name: Fast compile check (fail early on syntax/type errors)
        run: cargo check
        working-directory: src-tauri
      - run: npx tauri build --target aarch64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  # ── macOS x64 ──
  build-macos-x64:
    if: contains(fromJSON('["macos-x64", "all-desktop"]'), github.event.inputs.platform)
    runs-on: macos-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      CARGO_TERM_COLOR: always
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.source_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - run: npm ci --legacy-peer-deps
      - run: node scripts/generate-version.mjs
      - name: Prepare pdfium (macOS x64)
        run: |
          if [ -x "scripts/prepare-pdfium-macos.sh" ]; then
            bash scripts/prepare-pdfium-macos.sh "x86_64-apple-darwin"
          elif [ -x "scripts/download-pdfium.sh" ]; then
            rm -f src-tauri/resources/pdfium/libpdfium.dylib
            bash scripts/download-pdfium.sh macos-x64
          fi
      - name: Disable updater signing (build test)
        run: node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.bundle.createUpdaterArtifacts=false;c.plugins.updater.pubkey='';fs.writeFileSync(p,JSON.stringify(c,null,2))"
      - name: Fast compile check (fail early on syntax/type errors)
        run: cargo check
        working-directory: src-tauri
      - run: npx tauri build --target x86_64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: macos-x64-dmg
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  # ── Linux ──
  build-linux:
    if: contains(fromJSON('["linux", "all-desktop"]'), github.event.inputs.platform)
    runs-on: ubuntu-24.04
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      CARGO_TERM_COLOR: always
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.source_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf rpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - run: npm ci --legacy-peer-deps
      - run: node scripts/generate-version.mjs
      - name: Disable updater signing (build test)
        run: node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.bundle.createUpdaterArtifacts=false;c.plugins.updater.pubkey='';fs.writeFileSync(p,JSON.stringify(c,null,2))"
      - name: Fast compile check (fail early on syntax/type errors)
        run: cargo check
        working-directory: src-tauri
      - run: npx tauri build --target x86_64-unknown-linux-gnu --bundles deb,rpm,appimage
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

  # ── Android ──
  build-android:
    if: contains(fromJSON('["android", "all-desktop"]'), github.event.inputs.platform)
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      CARGO_TERM_COLOR: always
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.source_ref }}
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - name: Add swap space
        run: |
          if ! swapon --show --noheadings | grep -q .; then
            sudo fallocate -l 8G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=8192 status=progress
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile || true
          fi
          free -h
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Android SDK & NDK
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" "build-tools;35.0.0" "platforms;android-35" | tail -3
          echo "NDK_HOME=${ANDROID_HOME}/ndk/27.0.12077973" >> $GITHUB_ENV
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - run: npm ci --legacy-peer-deps
      - run: node scripts/generate-version.mjs
      - run: npx tauri android init
      - name: Bundle pdfium for Android
        run: |
          JNILIBS_DIR="src-tauri/gen/android/app/src/main/jniLibs/arm64-v8a"
          mkdir -p "$JNILIBS_DIR"
          if [ -f "src-tauri/resources/pdfium/libpdfium_android_arm64.so" ]; then
            cp src-tauri/resources/pdfium/libpdfium_android_arm64.so "$JNILIBS_DIR/libpdfium.so"
          else
            bash scripts/download-pdfium.sh android-arm64
            cp src-tauri/resources/pdfium/libpdfium_android_arm64.so "$JNILIBS_DIR/libpdfium.so"
          fi
      - name: Configure NDK toolchain
        run: |
          NDK_PREBUILT="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"
          sed -i '/\[target.aarch64-linux-android\]/,/^$/{ s|linker = .*|linker = "'"${NDK_PREBUILT}"'/bin/aarch64-linux-android21-clang"|; s|ar = .*|ar = "'"${NDK_PREBUILT}"'/bin/llvm-ar"| }' src-tauri/.cargo/config.toml
          echo "CC_aarch64_linux_android=${NDK_PREBUILT}/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=${NDK_PREBUILT}/bin/aarch64-linux-android21-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=${NDK_PREBUILT}/bin/llvm-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${NDK_PREBUILT}/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV
      - name: Fast compile check (fail early on syntax/type errors)
        run: cargo check
        working-directory: src-tauri
      - name: Build Android APK
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false
        run: |
          timeout --signal=TERM --kill-after=60s 120m npx tauri android build --target aarch64 || {
            s=$?
            if [ "$s" -eq 124 ]; then
              echo "::error::Android build timed out after 120 minutes"
            else
              echo "::error::Android build failed with exit code ${s}"
            fi
            exit "$s"
          }
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk

  # ── iPad ──
  build-ipad:
    if: contains(fromJSON('["ipad", "all-desktop"]'), github.event.inputs.platform)
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      NODE_OPTIONS: '--max-old-space-size=4096'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.source_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - run: npm ci --legacy-peer-deps
      - run: node scripts/generate-version.mjs
      - name: Initialize Tauri iOS project
        working-directory: src-tauri
        run: |
          if [ ! -d "gen/apple" ]; then
            npx tauri ios init
          fi
      - name: Fast compile check (fail early on syntax/type errors)
        run: cargo check
        working-directory: src-tauri
      - name: Build iPad app
        working-directory: src-tauri
        run: |
          npx tauri ios build --target aarch64-apple-ios --debug
          mkdir -p Payload
          APP_PATH=$(find gen/apple/build -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            cp -R "$APP_PATH" Payload/
            zip -r "DeepStudent-iPadOS.ipa" Payload/
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ipad-installer
          path: src-tauri/DeepStudent-iPadOS.ipa
