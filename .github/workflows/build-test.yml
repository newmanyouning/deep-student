# ╔══════════════════════════════════════════════════════════════════╗
# ║  测试构建 (只构建产物，不分发)                                  ║
# ╠══════════════════════════════════════════════════════════════════╣
# ║  用途: 生成安装包用于功能测试，不上传到 Release/R2              ║
# ║  触发: GitHub Actions → Build Test → Run workflow               ║
# ║        选择平台 + 代码分支                                      ║
# ║  产物: 在 Actions 运行页面的 Artifacts 中下载 (保留 7 天)        ║
# ╚══════════════════════════════════════════════════════════════════╝

name: Build Test (No Publish)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '构建平台'
        required: true
        type: choice
        default: 'windows'
        options:
          - windows
          - macos-arm64
          - macos-x64
          - linux
          - android
          - all-desktop
      source_ref:
        description: '代码分支/tag/commit (默认 main)'
        required: false
        default: 'main'
        type: string

concurrency:
  group: build-test-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Windows
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-windows:
    if: contains(fromJSON('["windows", "all-desktop"]'), github.event.inputs.platform)
    runs-on: windows-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}

      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - uses: dtolnay/rust-toolchain@stable

      - uses: arduino/setup-protoc@v3
        with: { repo-token: ${{ secrets.GITHUB_TOKEN }} }

      - uses: swatinem/rust-cache@v2
        with: { workspaces: './src-tauri -> target' }

      - run: npm ci --legacy-peer-deps

      - name: Build
        run: npx tauri build --target x86_64-pc-windows-msvc

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # macOS ARM64
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-macos-arm64:
    if: contains(fromJSON('["macos-arm64", "all-desktop"]'), github.event.inputs.platform)
    runs-on: macos-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}

      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: aarch64-apple-darwin }

      - uses: arduino/setup-protoc@v3
        with: { repo-token: ${{ secrets.GITHUB_TOKEN }} }

      - uses: swatinem/rust-cache@v2
        with: { workspaces: './src-tauri -> target' }

      - run: npm ci --legacy-peer-deps

      - name: Build
        run: npx tauri build --target aarch64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # macOS x64
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-macos-x64:
    if: contains(fromJSON('["macos-x64", "all-desktop"]'), github.event.inputs.platform)
    runs-on: macos-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}

      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-apple-darwin }

      - uses: arduino/setup-protoc@v3
        with: { repo-token: ${{ secrets.GITHUB_TOKEN }} }

      - uses: swatinem/rust-cache@v2
        with: { workspaces: './src-tauri -> target' }

      - run: npm ci --legacy-peer-deps

      - name: Build
        run: npx tauri build --target x86_64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: macos-x64-dmg
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Linux
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-linux:
    if: contains(fromJSON('["linux", "all-desktop"]'), github.event.inputs.platform)
    runs-on: ubuntu-24.04
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}

      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-unknown-linux-gnu }

      - uses: arduino/setup-protoc@v3
        with: { repo-token: ${{ secrets.GITHUB_TOKEN }} }

      - uses: swatinem/rust-cache@v2
        with: { workspaces: './src-tauri -> target' }

      - run: npm ci --legacy-peer-deps

      - name: Build
        run: npx tauri build --target x86_64-unknown-linux-gnu --bundles deb,appimage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Android
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-android:
    if: contains(fromJSON('["android", "all-desktop"]'), github.event.inputs.platform)
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }

      - name: Setup Android SDK
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" "build-tools;35.0.0" "platforms;android-35" | tail -3
          echo "NDK_HOME=${ANDROID_HOME}/ndk/27.0.12077973" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: aarch64-linux-android }

      - uses: arduino/setup-protoc@v3
        with: { repo-token: ${{ secrets.GITHUB_TOKEN }} }

      - uses: swatinem/rust-cache@v2
        with: { workspaces: './src-tauri -> target' }

      - run: npm ci --legacy-peer-deps

      - name: Init & Build Android
        run: |
          npx tauri android init
          npx tauri android build --target aarch64

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk
